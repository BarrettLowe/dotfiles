# this is an attempt that sets the color correctly. May be incorrect but works over vpn on mintty with ssh
# Working: vpn ssh mintty:xterm-256color
if-shell "uname | grep -q '[Linux|Darwin]'" "set-option -g default-terminal \"screen-256color\"" "set-option -g default-terminal \"screen\""
if-shell "uname | grep -q 'CYGWIN'" " set-option -g default-terminal \"xterm-256color\" "

# set -g status-utf8 on
# set -g status-bg black
# set -g status-fg white

unbind C-b
set -g prefix C-a
# bind C-a send-prefix

bind-key a send-prefix
bind-key x kill-pane
bind-key b break-pane

setw -g monitor-activity off
set -g base-index 1
set -g terminal-overrides ",foot:Tc"

set-option -sg escape-time 0
set-option -g focus-events on
set-option -sa terminal-features ',xterm-256color:RGB'
set -g set-clipboard on

set-option -g history-limit 10000

set -g pane-active-border-style fg=colour208,bg=colour238
set -g pane-border-style fg=colour237

# Status bar - consistent background across all sections
set -g status-bg colour235
set -g status-fg colour250
set -g status-left "#[bg=colour235,fg=colour208,bold] #S#[bg=colour235,fg=colour250] "
set -g status-right " %H:%M %d-%b-%y "
setw -g window-status-format "#[bg=colour235] #I:#W "
setw -g window-status-current-format "#[bg=colour235,fg=colour208,bold] #I:#W #[bg=colour235,fg=colour250]"

set -g display-panes-time 2000
set -g default-shell /bin/zsh

########## KEY BINDINGS ##########
unbind [
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
bind ] select-window -t:+1
bind [ select-window -t:-1

## bind | split-window -h -c "#{pane_current_path}"
## bind - split-window -v -c "#{pane_current_path}"

bind h select-pane -L
bind k select-pane -U
bind j select-pane -D
bind l select-pane -R
bind R source-file ~/.tmux.conf

bind y setw synchronize-panes

bind -r H resize-pane -L 5
bind -r K resize-pane -U 5
bind -r J resize-pane -D 5
bind -r L resize-pane -R 5

bind N choose-window 'join-pane -s ""%%""'

# 1. Use vi keys
setw -g mode-keys vi

# 2. Enter copy mode with 'v' (Prefix + v)
unbind v
bind v copy-mode

# 3. Once inside copy mode, use 'v' to select and 'y' to yank
bind -T copy-mode-vi v send-keys -X begin-selection
# bind -T copy-mode-vi y send-keys -X copy-selection-and-cancel
# Auto-detect clipboard tool: Wayland (wl-copy) → X11 (xclip) → macOS (pbcopy)
run-shell ' \
    if command -v wl-copy >/dev/null 2>&1; then \
        tmux bind-key -T copy-mode-vi y send-keys -X copy-pipe-and-cancel "wl-copy"; \
    elif command -v xclip >/dev/null 2>&1; then \
        tmux bind-key -T copy-mode-vi y send-keys -X copy-pipe-and-cancel "xclip -selection clipboard -in"; \
    elif command -v pbcopy >/dev/null 2>&1; then \
        tmux bind-key -T copy-mode-vi y send-keys -X copy-pipe-and-cancel "pbcopy"; \
    fi \
'
bind -T copy-mode-vi C-v send-keys -X rectangle-toggle
unbind p
bind p paste-buffer


unbind -T copy-mode L
bind -T copy-mode 'L' send -X end-of-line
unbind -T copy-mode H
bind -T copy-mode 'H' send -X start-of-line

bind ] select-window -t:+1
bind [ select-window -t:-1

set -gq update-environment ""

set -g allow-passthrough on

# set -g default-command '/usr/local/bin/zsh'
bind g run-shell '\
  SESSION="claude-$(echo #{pane_current_path} | md5sum | cut -c1-8)"; \
  tmux has-session -t "$SESSION" 2>/dev/null || \
  tmux new-session -d -s "$SESSION" -c "#{pane_current_path}" "claude"; \
  tmux display-popup -w80% -h80% -E "tmux attach-session -t $SESSION"'

bind e run-shell '\
  tmux display-popup -w80% -h80% -d "#{pane_current_path}"'

bind C display-popup -w90% -h90% -E 'devpod ssh $(devpod list --output json | jq -r ".[].id" | fzf)'

bind G run-shell '\
  SESSION=$(~/dotfiles/bin/devpod-attach "#{pane_current_path}"); \
  [ -n "$SESSION" ] && tmux display-popup -w80% -h80% -E "tmux attach-session -t $SESSION"'

set-option -g status-justify absolute-centre
