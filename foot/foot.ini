term=foot

# Theme colors are managed by ~/dotfiles/bin/theme.
# ~/.config/foot/theme-colors.ini is a symlink to colors-dark.ini or colors-light.ini.
include=~/.config/foot/theme-colors.ini

[main]
font=JetBrainsMono Nerd Font:size=11
dpi-aware=yes

[colors]
# alpha is always set here so it overrides anything in theme-colors.ini
alpha=0.95

[text-bindings]
\x17 = ctrl+BackSpace
